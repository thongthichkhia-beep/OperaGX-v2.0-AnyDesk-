name: Cloud PC + RustDesk + Opera GX (Ultimate Mobile Controls)

on:
  workflow_dispatch:
    inputs:
      runtime_minutes:
        description: "Runtime in minutes (max 360)"
        required: false
        default: "355"

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  desktop:
    runs-on: windows-latest
    timeout-minutes: 370
    env:
      rdp_user: user
      rdp_pass: Pass1234

    steps:
      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          Write-Host "Purging pre-installed desktop icons and non-essential software..."
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $userDesktop = "$env:USERPROFILE\Desktop"
          
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) {
              if (Test-Path "$publicDesktop\$target") { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }
              if (Test-Path "$userDesktop\$target") { Remove-Item "$userDesktop\$target" -Force -ErrorAction SilentlyContinue }
          }

      - name: Optimize Resolution for Mobile Display
        run: |
          Write-Host "Forcing resolution calibration matrix..."
          Set-DisplayResolution -Width 1280 -Height 720 -Force -ErrorAction SilentlyContinue
          "RUNTIME_MINUTES=${{ inputs.runtime_minutes }}" | Out-File -Append $env:GITHUB_ENV

      - name: Install RustDesk Host Engine
        run: |
          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"
          if (-not (Test-Path $rdExe)) {
            $rdUrl = "https://github.com/rustdesk/rustdesk/releases/download/1.3.1/rustdesk-1.3.1-x86_64.msi"
            $installerPath = "$env:TEMP\rustdesk.msi"
            Invoke-WebRequest -Uri $rdUrl -OutFile $installerPath
            Start-Process msiexec.exe -ArgumentList "/i","`"$installerPath`"","/quiet","/norestart" -Wait
            Remove-Item $installerPath -Force
          }

      - name: Configure RustDesk Network Options & Credentials
        run: |
          # Sets your permanent security key
          & "C:\Program Files\RustDesk\rustdesk.exe" --password "$env:rdp_pass"
          
          # Adjust internal network parameters to bypass unauthenticated public grid block rules
          & "C:\Program Files\RustDesk\rustdesk.exe" --config '{"id-server": "rustdesk.com"}' 2>$null
          
          Write-Host "RustDesk permanent security key set to: $env:rdp_pass"

      - name: Open Firewall Rules for RustDesk Port Mapping
        run: |
          for ($p=21115; $p -le 21119; $p++) {
            $name = "APP-PORT-TCP-$p"
            netsh advfirewall firewall delete rule name=$name 2>$null
            netsh advfirewall firewall add rule name=$name dir=in action=allow protocol=TCP localport=$p | Out-Null
          }
          netsh advfirewall firewall delete rule name="APP-PORT-UDP-21116" 2>$null
          netsh advfirewall firewall add rule name="APP-PORT-UDP-21116" dir=in action=allow protocol=UDP localport=21116 | Out-Null

      - name: Launch RustDesk Host Portal
        run: |
          Write-Host "Launching background primary graphics loop for RustDesk..."
          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"
          Start-Process -FilePath $rdExe -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5

      - name: Capture Live Credentials Layout & Upload to Gofile
        run: |
          $screenshotPath = "$env:TEMP\rustdesk_credentials.png"
          
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bitmap = New-Object System.Drawing.Bitmap $bounds.Width, $bounds.Height
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
          $bitmap.Save($screenshotPath, [System.Drawing.Imaging.ImageFormat]::Png)
          $graphics.Dispose(); $bitmap.Dispose()

          Write-Host "Uploading connection layout matrix to cloud storage..."
          $curlResult = curl.exe -F "file=@$screenshotPath" https://store1.gofile.io/contents/uploadfile
          $json = $curlResult | ConvertFrom-Json
          if ($json.status -eq "ok") { 
              $DownloadUrl = $json.data.downloadPage
              "SCREENSHOT_URL=$DownloadUrl" | Out-File -Append $env:GITHUB_ENV
              
              # ANSI Escape Sequences for structural color output execution
              $Esc = [char]27
              $Cyan = "$Esc[36m"
              $Yellow = "$Esc[33m"
              $Green = "$Esc[32m"
              $Reset = "$Esc[0m"

              Write-Host ""
              Write-Host "${Cyan}###########################################################################${Reset}"
              Write-Host "${Yellow}🚨 ATTENTION VIEWERS: LIVE CREDENTIALS CAPTURE URL GENERATED 🚨${Reset}"
              Write-Host "${Cyan}###########################################################################${Reset}"
              Write-Host "${Green}➡️ LINK: $DownloadUrl${Reset}"
              Write-Host "${Cyan}###########################################################################${Reset}"
              Write-Host ""
          } else {
              Write-Warning "Gofile capture delivery dropped."
          }

      - name: Enforce 10-Second System Settlement Delay
        run: |
          Write-Host "Pausing for 10 seconds before proceeding to browser installation..."
          Start-Sleep -Seconds 10

      - name: Download & Force Consumer Build of Opera GX
        run: |
          Write-Host "Fetching consumer-stable Opera GX Core..."
          $url = "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx"
          $installer = "$env:TEMP\OperaGXSetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          
          Start-Process -FilePath $installer -ArgumentList "--silent=1", "--allusers=1", "--launchbrowser=0" -Wait
          Start-Sleep -Seconds 4
          
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $userDesktop = "$env:USERPROFILE\Desktop"
          
          if (Test-Path "$userDesktop\Opera GX.lnk") { Remove-Item "$userDesktop\Opera GX.lnk" -Force -ErrorAction SilentlyContinue }
          if (Test-Path "$publicDesktop\Opera GX.lnk") { Remove-Item "$publicDesktop\Opera GX.lnk" -Force -ErrorAction SilentlyContinue }
          
          Write-Host "Configuring explicit launcher shortcut with forced promo link and sidebar flags..."
          $operaExe = "$env:ProgramFiles\Opera GX\opera.exe"
          if (-not (Test-Path $operaExe)) { $operaExe = "$env:ProgramFiles (x86)\Opera GX\opera.exe" }
          
          $WshShell = New-Object -ComObject WScript.Shell
          $Shortcut = $WshShell.CreateShortcut("$publicDesktop\Opera GX Browser.lnk")
          $Shortcut.TargetPath = $operaExe
          $Shortcut.Arguments = "https://www.opera.com/gx/forsaken --no-first-run --enable-features=GXRewards,GXRewardsSidebarItem --with-feature:gx-rewards=1"
          $Shortcut.Save()

      - name: Trigger Custom promo link Layout Background
        run: |
          Write-Host "Executing promotional browser instance..."
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          Start-Process "$publicDesktop\Opera GX Browser.lnk"
          Start-Sleep -Seconds 6

      - name: Hide Host Agent Window ONLY (Targeted Minimization)
        run: |
          Write-Host "Targeting and minimizing host runner console window background thread..."
          $memberDef = @'
          [DllImport("user32.dll")]
          public static extern bool ShowWindowAsync(IntPtr hWnd, int nCmdShow);
          [DllImport("kernel32.dll")]
          public static extern IntPtr GetConsoleWindow();
          '@
          $win32 = Add-Type -MemberDefinition $memberDef -Name "Win32Util" -Namespace "Win32" -PassThru
          
          $consoleHandle = $win32::GetConsoleWindow()
          if ($consoleHandle -ne [IntPtr]::Zero) {
              $win32::ShowWindowAsync($consoleHandle, 2) | Out-Null
              Write-Host "Host Agent window safely tucked away."
          }

      - name: Keep Alive Execution Loop
        run: |
          $mins = [int]$env:RUNTIME_MINUTES
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host "Cloud PC Active Status | Heartbeat Signal Active | System Session Ends at: $($end.ToString('HH:mm:ss'))"
            Start-Sleep -Seconds 60
          }
