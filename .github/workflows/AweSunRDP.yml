name: Cloud PC + AweSun + Opera GX (Fix Download Path)

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 190
    env:
      AWESUN_PASS: Pass@1234
      RUNTIME_MINUTES: 180

    steps:
      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          Write-Host "Purging pre-installed desktop icons and non-essential software..."
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $userDesktop = "$env:USERPROFILE\Desktop"
          
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) {
              if (Test-Path "$publicDesktop\$target") { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }
              if (Test-Path "$userDesktop\$target") { Remove-Item "$userDesktop\$target" -Force -ErrorAction SilentlyContinue }
          }

      - name: Download and Force Install AweSun Global Client
        run: |
          Write-Host "Fetching AweSun Global Distribution Installer..."
          # Corrected the download endpoint to the active official distribution host
          $url = "https://sun.aweray.com/download/awesun_win_client"
          $dst = "$env:TEMP\AweSunSetup.exe"
          
          # Attempt download with explicit TLS fallback parameters
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri $url -OutFile $dst -UserAgent "Mozilla/5.0"
          
          Write-Host "Executing absolute background silent installation..."
          # Uses uppercase /S which maps perfectly to the NSIS engine parameters
          Start-Process $dst -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 8
          Remove-Item $dst -ErrorAction SilentlyContinue

      - name: Configure Unattended Security Password & Unblock Global Routing
        run: |
          Write-Host "Applying network routing patches and unattended system passwords..."
          $aweExe = "C:\Program Files (x86)\AweSun\AweSun.exe"
          if (-not (Test-Path $aweExe)) { $aweExe = "C:\Program Files\AweSun\AweSun.exe" }
          
          # Forces the local runtime parameters to drop geographic/subnet matching restrictions
          $regPath = "HKLM:\SOFTWARE\AweSun"
          if (-not (Test-Path $regPath)) { New-Item -Path $regPath -Force | Out-Null }
          New-ItemProperty -Path $regPath -Name "EnableGlobalNodes" -PropertyType DWord -Value 1 -Force -ErrorAction SilentlyContinue
          New-ItemProperty -Path $regPath -Name "DirectConnectMode" -PropertyType DWord -Value 1 -Force -ErrorAction SilentlyContinue
          
          # Sets up your fixed unattended access security keys via the software control layer
          if (Test-Path $aweExe) {
              Start-Process -FilePath $aweExe -ArgumentList "--set-password=`"${{ env.AWESUN_PASS }}`"", "--silent" -Wait
          }
          
          # Allow full mobile touch injection properties to register cleanly through the OS core
          New-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -Name "EnableUIADesktopToggle" -PropertyType DWord -Value 1 -Force -ErrorAction SilentlyContinue
          
          $path = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced"
          Set-ItemProperty -Path $path -Name "TaskbarGlomLevel" -Value 0 -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5

      - name: Minimize Running Infrastructure Windows
        run: |
          Write-Host "Sending active command prompt windows to the taskbar tray..."
          $shell = New-Object -ComObject Shell.Application
          $shell.MinimizeAll()

      - name: Optimize Resolution for Mobile Display
        run: |
          Write-Host "Forcing resolution calibration matrix..."
          Set-DisplayResolution -Width 1280 -Height 720 -Force -ErrorAction SilentlyContinue

      - name: Download & Force Consumer Build of Opera GX
        run: |
          Write-Host "Fetching consumer-stable Opera GX Core..."
          $url = "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx"
          $installer = "$env:TEMP\OperaGXSetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          
          Start-Process -FilePath $installer -ArgumentList "--silent=1", "--allusers=1", "--launchbrowser=0", "--desktopshortcut=1" -Wait
          
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $userDesktop = "$env:USERPROFILE\Desktop"
          
          if (Test-Path "$userDesktop\Opera GX.lnk") {
              Move-Item -Path "$userDesktop\Opera GX.lnk" -Destination $publicDesktop -Force -ErrorAction SilentlyContinue
          }
          
          Write-Host "Configuring explicit launcher shortcut with forced promo link and sidebar flags..."
          $operaExe = "$env:ProgramFiles\Opera GX\opera.exe"
          if (-not (Test-Path $operaExe)) { $operaExe = "$env:ProgramFiles (x86)\Opera GX\opera.exe" }
          
          $WshShell = New-Object -ComObject WScript.Shell
          $Shortcut = $WshShell.CreateShortcut("$publicDesktop\Opera GX Browser.lnk")
          $Shortcut.TargetPath = $operaExe
          $Shortcut.Arguments = "https://www.opera.com/gx/forsaken --no-first-run --enable-features=GXRewards,GXRewardsSidebarItem --with-feature:gx-rewards=1"
          $Shortcut.Save()

      - name: Fetch and Display AweSun Connection Credentials
        run: |
          Write-Host "Extracting terminal ID codes from service database..."
          $logPath = "C:\ProgramData\AweSun\logs\awesun_service.log"
          $deviceId = "Fetching..."
          
          for ($i = 1; $i -le 12; $i++) {
              if (Test-Path $logPath) {
                  $logContent = Get-Content $logPath -Tail 100 -ErrorAction SilentlyContinue
                  if ($logContent -match 'OnyxID:\s*(\d+)' -or $logContent -match 'DeviceID:\s*(\d+)') {
                      $deviceId = $Matches[1]
                      break
                  }
              }
              $cfgPath = "C:\ProgramData\AweSun\config.ini"
              if (Test-Path $cfgPath) {
                  $cfg = Get-Content $cfgPath -Raw -ErrorAction SilentlyContinue
                  if ($cfg -match 'cid\s*=\s*(\d+)') {
                      $deviceId = $Matches[1]
                      break
                  }
              }
              Start-Sleep -Seconds 5
          }
          
          $ESC = [char]27
          $Green = "$ESC[32m"
          $Yellow = "$ESC[33m"
          $Red = "$ESC[31m"
          $Reset = "$ESC[0m"
          
          Write-Host "${Green}====================================================${Reset}"
          Write-Host "${Green}       AWESUN CLOUD MACHINE IS READY TO CONNECT      ${Reset}"
          Write-Host "${Green}====================================================${Reset}"
          Write-Host "${Yellow} AWESUN DEVICE ID : ${Red}${deviceId}${Reset}"
          Write-Host "${Yellow} ACCESS PASSWORD  : ${Red}${{ env.AWESUN_PASS }}${Reset}"
          Write-Host "${Green}====================================================${Reset}"

      - name: Keep alive
        run: |
          $mins = [int]"${{ env.RUNTIME_MINUTES }}"
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host ("Cloud PC Heartbeat " + (Get-Date).ToString("HH:mm:ss") + " | Active until " + $end.ToString("HH:mm:ss"))
            Start-Sleep -Seconds 60
          }
