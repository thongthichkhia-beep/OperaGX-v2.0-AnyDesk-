name: AnyDesk

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 190
    env:
      ANYDESK_PASS: Pass1234
      RUNTIME_MINUTES: 180

    steps:
      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }

      - name: Dismiss Windows Popups
        run: |
          Stop-Process -Name "systempropertiesadvanced" -Force -ErrorAction SilentlyContinue
          Stop-Process -Name "systempropertiescomputername" -Force -ErrorAction SilentlyContinue

      - name: Install AnyDesk
        run: |
          $url = "https://download.anydesk.com/AnyDesk.exe"
          $dst = "$env:TEMP\AnyDesk.exe"
          Invoke-WebRequest -Uri $url -OutFile $dst
          
          # Force silent install and register for unattended access
          Start-Process $dst -ArgumentList "--install", "C:\Program Files (x86)\AnyDesk", "--silent", "--start-with-win" -Wait
          Start-Sleep -Seconds 5
          Remove-Item $dst -ErrorAction SilentlyContinue

      - name: Configure AnyDesk Password
        run: |
          $ad = "C:\Program Files (x86)\AnyDesk\AnyDesk.exe"
          # Direct password set command for AnyDesk
          cmd.exe /c "echo ${{ env.ANYDESK_PASS }} | `"$ad`" --set-password"
          Start-Process -FilePath $ad -ArgumentList "--restart-service" -Wait
          Start-Sleep -Seconds 5

      - name: Minimize Windows & Set Resolution
        run: |
          $shell = New-Object -ComObject Shell.Application
          $shell.MinimizeAll()
          # Using standard resolution that Windows Server handles gracefully
          Set-DisplayResolution -Width 1600 -Height 1200 -Force -ErrorAction SilentlyContinue

      - name: Install Opera GX
        run: |
          $url = "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx"
          $installer = "$env:TEMP\OperaGXSetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "--silent=1", "--allusers=1" -Wait
          
          # Setup Shortcut
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $WshShell = New-Object -ComObject WScript.Shell
          $Shortcut = $WshShell.CreateShortcut("$publicDesktop\Opera GX Browser.lnk")
          $Shortcut.TargetPath = "$env:ProgramFiles\Opera GX\opera.exe"
          $Shortcut.Arguments = "https://www.opera.com/gx/forsaken"
          $Shortcut.Save()

      - name: Get AnyDesk ID
        run: |
          $conf = "C:\ProgramData\AnyDesk\system.conf"
          for ($i=1; $i -le 10; $i++) {
              if (Test-Path $conf) {
                  $id = (Get-Content $conf | Select-String 'ad\.anynet\.id=(\d+)').Matches.Groups[1].Value
                  if ($id) { Write-Host "CONNECTION ID : $id"; break }
              }
              Start-Sleep -Seconds 5
          }

      - name: Keep alive
        run: |
          $end = (Get-Date).AddMinutes($env:RUNTIME_MINUTES)
          while ((Get-Date) -lt $end) { Start-Sleep -Seconds 60 }
